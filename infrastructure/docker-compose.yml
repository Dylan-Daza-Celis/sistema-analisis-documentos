services:

  minio:
    image: nginx:1.25-alpine
    container_name: minio
    volumes:
      - ./nginx/minio.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - minio1
      - minio2
      - minio3
      - minio4
    networks:
      - sistema-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

  minio1:
    image: minio/minio
    container_name: minio1
    hostname: minio1
    command: server http://minio1/data http://minio2/data http://minio3/data http://minio4/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - /mnt/distributed/minio1:/data
    ports:
      - "9001:9001"
    networks:
      - sistema-network
    restart: on-failure

  minio2:
    image: minio/minio
    container_name: minio2
    hostname: minio2
    command: server http://minio1/data http://minio2/data http://minio3/data http://minio4/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - /mnt/distributed/minio2:/data
    networks:
      - sistema-network
    restart: on-failure

  minio3:
    image: minio/minio
    container_name: minio3
    hostname: minio3
    command: server http://minio1/data http://minio2/data http://minio3/data http://minio4/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - /mnt/distributed/minio3:/data
    networks:
      - sistema-network
    restart: on-failure

  minio4:
    image: minio/minio
    container_name: minio4
    hostname: minio4
    command: server http://minio1/data http://minio2/data http://minio3/data http://minio4/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - /mnt/distributed/minio4:/data
    networks:
      - sistema-network
    restart: on-failure

  gateway:
    build: ../api-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:3000
      DOCUMENT_SERVICE_URL: http://document-service:3000
      CLASSIFICATION_SERVICE_URL: http://classification-service:3000
      USER_SERVICE_URL: http://user-service:3000
      CITATION_SERVICE_URL: http://citation-service:3000
    depends_on:
      - auth-service
      - document-service
      - classification-service
      - user-service
      - citation-service
    networks:
      - sistema-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

  auth-service:
    build: ../services/auth-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
    networks:
      - sistema-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

  user-service:
    build: ../services/user-service
    environment:
      AUTH_SERVICE_URL: http://auth-service:3000
      CLASSIFICATION_SERVICE_URL: http://classification-service:3000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
    depends_on:
      - minio
      - auth-service
      - classification-service
    networks:
      - sistema-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

  document-service:
    build: ../services/document-service
    environment:
      CLASSIFICATION_SERVICE_URL: http://classification-service:3000
      KAFKA_BROKERS: kafka1:9092,kafka2:9092,kafka3:9092
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
    depends_on:
      - minio
      - kafka1
      - kafka2
      - kafka3
    networks:
      - sistema-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

  classification-service:
    build: ../services/classification-service
    environment:
      HUGGINGFACE_API_TOKEN: ${HUGGINGFACE_API_TOKEN:-}
      ZERO_SHOT_MODEL: ${ZERO_SHOT_MODEL:-MoritzLaurer/mDeBERTa-v3-base-mnli-xnli}
      CLASSIFICATION_THRESHOLD: ${CLASSIFICATION_THRESHOLD:-0.45}
      CLASSIFICATION_MAX_CHARS: ${CLASSIFICATION_MAX_CHARS:-2500}
      USER_SERVICE_URL: http://user-service:3000
      CLASSIFICATION_MODEL_URL: http://classification-model:5000
      KAFKA_BROKERS: kafka1:9092,kafka2:9092,kafka3:9092
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
    depends_on:
      - minio
      - kafka1
      - kafka2
      - kafka3
      - classification-model
    networks:
      - sistema-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

  citation-service:
    build: ../services/citation-service
    networks:
      - sistema-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

  kafka1:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka1
    hostname: kafka1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID}
    networks:
      - sistema-network
    volumes:
      - /mnt/distributed/kafka1:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: on-failure

  kafka2:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka2
    hostname: kafka2
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID}
    networks:
      - sistema-network
    volumes:
      - /mnt/distributed/kafka2:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: on-failure

  kafka3:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka3
    hostname: kafka3
    ports:
      - "9094:9092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID}
    networks:
      - sistema-network
    volumes:
      - /mnt/distributed/kafka3:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: on-failure

  classification-model:
    build:
      context: ../services/classification-model-service
      dockerfile: Dockerfile
    container_name: classification-model
    environment:
      FLASK_ENV: production
    networks:
      - sistema-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

networks:
  sistema-network:
    name: sistema-network
    driver: bridge
