services:

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123

  gateway:
    build: ../api-gateway
    ports:
      - "8080:8080"

  auth-service:
    build: ../services/auth-service
    ports:
      - "3001:3000"

  document-service:
    build: ../services/document-service
    ports:
      - "3002:3000"
    depends_on:
      - minio
      - kafka

  classification-service:
    build: ../services/classification-service
    ports:
      - "3003:3000"
    environment:
      HUGGINGFACE_API_TOKEN: ${HUGGINGFACE_API_TOKEN:-}
      ZERO_SHOT_MODEL: ${ZERO_SHOT_MODEL:-MoritzLaurer/mDeBERTa-v3-base-mnli-xnli}
      CLASSIFICATION_THRESHOLD: ${CLASSIFICATION_THRESHOLD:-0.45}
      CLASSIFICATION_MAX_CHARS: ${CLASSIFICATION_MAX_CHARS:-2500}
    depends_on:
      - minio
      - kafka
  
  kafka:
    image: bitnamilegacy/kafka:3.6
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"