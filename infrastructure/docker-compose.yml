services:

  minio:
    image: nginx:1.25-alpine
    container_name: minio
    ports:
      - "9000:9000"
    volumes:
      - ./nginx/minio.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - minio1
      - minio2
      - minio3
      - minio4

  minio1:
    image: minio/minio
    container_name: minio1
    command: server http://minio1/data http://minio2/data http://minio3/data http://minio4/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio1-data:/data
    ports:
      - "9001:9001"

  minio2:
    image: minio/minio
    container_name: minio2
    command: server http://minio1/data http://minio2/data http://minio3/data http://minio4/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio2-data:/data

  minio3:
    image: minio/minio
    container_name: minio3
    command: server http://minio1/data http://minio2/data http://minio3/data http://minio4/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio3-data:/data

  minio4:
    image: minio/minio
    container_name: minio4
    command: server http://minio1/data http://minio2/data http://minio3/data http://minio4/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio4-data:/data

  gateway:
    build: ../api-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:3000
      DOCUMENT_SERVICE_URL: http://document-service:3000
      CLASSIFICATION_SERVICE_URL: http://classification-service:3000
      USER_SERVICE_URL: http://user-service:3000
      CITATION_SERVICE_URL: http://citation-service:3000
    depends_on:
      - auth-service
      - document-service
      - classification-service
      - user-service
      - citation-service

  auth-service:
    build: ../services/auth-service
    ports:
      - "3001:3000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}

  user-service:
    build: ../services/user-service
    ports:
      - "3004:3000"
    environment:
      AUTH_SERVICE_URL: http://auth-service:3000
      CLASSIFICATION_SERVICE_URL: http://classification-service:3000
    depends_on:
      - minio
      - auth-service
      - classification-service

  document-service:
    build: ../services/document-service
    ports:
      - "3002:3000"
    depends_on:
      - minio
      - kafka

  classification-service:
    build: ../services/classification-service
    ports:
      - "3003:3000"
    environment:
      HUGGINGFACE_API_TOKEN: ${HUGGINGFACE_API_TOKEN:-}
      ZERO_SHOT_MODEL: ${ZERO_SHOT_MODEL:-MoritzLaurer/mDeBERTa-v3-base-mnli-xnli}
      CLASSIFICATION_THRESHOLD: ${CLASSIFICATION_THRESHOLD:-0.45}
      CLASSIFICATION_MAX_CHARS: ${CLASSIFICATION_MAX_CHARS:-2500}
      USER_SERVICE_URL: http://user-service:3000
    depends_on:
      - minio
      - kafka

  citation-service:
    build: ../services/citation-service
    ports:
      - "3005:3000"
  
  kafka:
    image: bitnamilegacy/kafka:3.6
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://172.20.10.3:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

volumes:
  minio1-data:
  minio2-data:
  minio3-data:
  minio4-data: