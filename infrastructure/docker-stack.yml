version: "3.9"

services:
  gateway:
    image: ${REGISTRY:-localhost:5000}/api-gateway:latest
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:3000
      DOCUMENT_SERVICE_URL: http://document-service:3000
      CLASSIFICATION_SERVICE_URL: http://classification-service:3000
      USER_SERVICE_URL: http://user-service:3000
      CITATION_SERVICE_URL: http://citation-service:3000
    networks:
      - app-net
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == manager

  auth-service:
    image: ${REGISTRY:-localhost:5000}/auth-service:latest
    ports:
      - "3001:3000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
    networks:
      - app-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager1

  user-service:
    image: ${REGISTRY:-localhost:5000}/user-service:latest
    ports:
      - "3004:3000"
    environment:
      AUTH_SERVICE_URL: http://auth-service:3000
      CLASSIFICATION_SERVICE_URL: http://classification-service:3000
    networks:
      - app-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager2

  document-service:
    image: ${REGISTRY:-localhost:5000}/document-service:latest
    ports:
      - "3002:3000"
    networks:
      - app-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager2

  classification-service:
    image: ${REGISTRY:-localhost:5000}/classification-service:latest
    ports:
      - "3003:3000"
    environment:
      HUGGINGFACE_API_TOKEN: ${HUGGINGFACE_API_TOKEN:-}
      ZERO_SHOT_MODEL: ${ZERO_SHOT_MODEL:-MoritzLaurer/mDeBERTa-v3-base-mnli-xnli}
      CLASSIFICATION_THRESHOLD: ${CLASSIFICATION_THRESHOLD:-0.45}
      CLASSIFICATION_MAX_CHARS: ${CLASSIFICATION_MAX_CHARS:-2500}
      USER_SERVICE_URL: http://user-service:3000
    networks:
      - app-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager3

  citation-service:
    image: ${REGISTRY:-localhost:5000}/citation-service:latest
    ports:
      - "3005:3000"
    networks:
      - app-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager3

  kafka:
    image: bitnamilegacy/kafka:3.6
    ports:
      - "9092:9092"
    environment:
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
    networks:
      - app-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager1

  minio:
    image: nginx:1.25-alpine
    ports:
      - "9000:9000"
    configs:
      - source: minio_conf
        target: /etc/nginx/conf.d/default.conf
    networks:
      - app-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager1

  minio1:
    image: minio/minio
    command: server http://minio1/data http://minio2/data http://minio3/data http://minio4/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio1-data:/data
    ports:
      - "9001:9001"
    networks:
      - app-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager1

  minio2:
    image: minio/minio
    command: server http://minio1/data http://minio2/data http://minio3/data http://minio4/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio2-data:/data
    networks:
      - app-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager2

  minio3:
    image: minio/minio
    command: server http://minio1/data http://minio2/data http://minio3/data http://minio4/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio3-data:/data
    networks:
      - app-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager3

  minio4:
    image: minio/minio
    command: server http://minio1/data http://minio2/data http://minio3/data http://minio4/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio4-data:/data
    networks:
      - app-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager1

networks:
  app-net:
    driver: overlay

configs:
  minio_conf:
    file: ./nginx/minio.conf

volumes:
  minio1-data:
  minio2-data:
  minio3-data:
  minio4-data:
