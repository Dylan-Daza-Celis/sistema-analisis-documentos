version: "3.9"

services:

  gateway:
    image: infrastructure-gateway:latest

    ports:
      - "8080:8080"

    environment:
      PORT: "8080"
      AUTH_SERVICE_URL: "http://auth-service:3000"
      DOCUMENT_SERVICE_URL: "http://document-service:3000"
      CLASSIFICATION_SERVICE_URL: "http://classification-service:3000"
      USER_SERVICE_URL: "http://user-service:3000"
      CITATION_SERVICE_URL: "http://citation-service:3000"

    networks:
      - sistema-network

    deploy:
      placement:
        constraints:
          - node.hostname == dylan

  auth-service:
    image: infrastructure-auth-service:latest

    environment:
      JWT_SECRET: "dev-secret"
      JWT_EXPIRES_IN: "8h"

      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "9000"

      MINIO_USE_SSL: "false"

      MINIO_ACCESS_KEY: "admin"
      MINIO_SECRET_KEY: "password123"

    networks:
      - sistema-network

    deploy:
      placement:
        constraints:
          - node.hostname == diego

  user-service:
    image: infrastructure-user-service:latest

    environment:
      AUTH_SERVICE_URL: "http://auth-service:3000"
      CLASSIFICATION_SERVICE_URL: "http://classification-service:3000"

      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "9000"

      MINIO_USE_SSL: "false"

      MINIO_ACCESS_KEY: "admin"
      MINIO_SECRET_KEY: "password123"

    networks:
      - sistema-network

    deploy:
      placement:
        constraints:
          - node.hostname == diego

  document-service:
    image: infrastructure-document-service:latest

    environment:
      CLASSIFICATION_SERVICE_URL: "http://classification-service:3000"

      KAFKA_BROKERS: "192.168.100.201:9092"

      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "9000"

      MINIO_USE_SSL: "false"

      MINIO_ACCESS_KEY: "admin"
      MINIO_SECRET_KEY: "password123"

    networks:
      - sistema-network

    deploy:
      placement:
        constraints:
          - node.hostname == diego

  classification-service:
    image: infrastructure-classification-service:latest

    environment:
      HUGGINGFACE_API_TOKEN: ""
      ZERO_SHOT_MODEL: "MoritzLaurer/mDeBERTa-v3-base-mnli-xnli"

      CLASSIFICATION_THRESHOLD: "0.45"
      CLASSIFICATION_MAX_CHARS: "2500"

      USER_SERVICE_URL: "http://user-service:3000"

      CLASSIFICATION_MODEL_URL: "http://classification-model:5000"

      KAFKA_BROKERS: "192.168.100.201:9092"

      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "9000"

      MINIO_USE_SSL: "false"

      MINIO_ACCESS_KEY: "admin"
      MINIO_SECRET_KEY: "password123"

    networks:
      - sistema-network

    deploy:
      placement:
        constraints:
          - node.hostname == diego

  citation-service:
    image: infrastructure-citation-service:latest

    networks:
      - sistema-network

    deploy:
      placement:
        constraints:
          - node.hostname == diego

  classification-model:
    image: infrastructure-classification-model:latest

    environment:
      FLASK_ENV: "production"

    networks:
      - sistema-network

    deploy:
      placement:
        constraints:
          - node.hostname == dylan

  kafka1:
    image: confluentinc/cp-kafka:7.6.1

    hostname: kafka1

    ports:
      - "9092:9092"

    environment:
        CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

        KAFKA_NODE_ID: "1"

        KAFKA_PROCESS_ROLES: "broker,controller"

        KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"

        KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka1:9092"

        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"

        KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

        KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9093"

        KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"

        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"

        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"

        KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"

    volumes:
      - /mnt/distributed/kafka1:/var/lib/kafka/data

    networks:
      - sistema-network

    deploy:
      placement:
        constraints:
          - node.hostname == dylan

  minio:
    image: minio/minio:latest

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "password123"

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - /mnt/distributed/minio:/data

    networks:
      - sistema-network

    deploy:
      placement:
        constraints:
          - node.hostname == dylan

networks:
  sistema-network:
    external: true
    name: sistema-overlay