services:

  minio:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/minio.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - minio1
      - minio3
      - minio4
    networks:
      - sistema-network
    deploy:
      placement:
        constraints:
          - node.hostname == dylan

  minio1:
    image: minio/minio:latest
    hostname: minio1
    command: server http://sistema_minio1/data http://sistema_minio3/data http://sistema_minio4/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - /mnt/distributed/minio1:/data
    ports:
      - "9001:9001"
    networks:
      - sistema-network
    deploy:
      placement:
        constraints:
          - node.hostname == dylan

  minio3:
    image: minio/minio:latest
    hostname: minio3
    command: server http://sistema_minio1/data http://sistema_minio3/data http://sistema_minio4/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - /mnt/distributed/minio3:/data
    networks:
      - sistema-network
    deploy:
      placement:
        constraints:
          - node.hostname == diego

  minio4:
    image: minio/minio:latest
    hostname: minio4
    command: server http://sistema_minio1/data http://sistema_minio3/data http://sistema_minio4/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - /mnt/distributed/minio4:/data
    networks:
      - sistema-network
    deploy:
      placement:
        constraints:
          - node.hostname == diego

  gateway:
    image: infrastructure-gateway:latest
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      AUTH_SERVICE_URL: "http://auth-service:3000"
      DOCUMENT_SERVICE_URL: "http://document-service:3000"
      CLASSIFICATION_SERVICE_URL: "http://classification-service:3000"
      USER_SERVICE_URL: "http://user-service:3000"
      CITATION_SERVICE_URL: "http://citation-service:3000"
    depends_on:
      - auth-service
      - document-service
      - classification-service
      - user-service
      - citation-service
    networks:
      - sistema-network
    deploy:
      placement:
        constraints:
          - node.hostname == dylan

  auth-service:
    image: infrastructure-auth-service:latest
    environment:
      JWT_SECRET: "dev-secret"
      JWT_EXPIRES_IN: "8h"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "80"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: "admin"
      MINIO_SECRET_KEY: "password123"
    networks:
      - sistema-network
    deploy:
      placement:
        constraints:
          - node.hostname == diego

  user-service:
    image: infrastructure-user-service:latest
    environment:
      AUTH_SERVICE_URL: "http://auth-service:3000"
      CLASSIFICATION_SERVICE_URL: "http://classification-service:3000"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "80"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: "admin"
      MINIO_SECRET_KEY: "password123"
    depends_on:
      - minio
      - auth-service
      - classification-service
    networks:
      - sistema-network
    deploy:
      placement:
        constraints:
          - node.hostname == diego

  document-service:
    image: infrastructure-document-service:latest
    environment:
      CLASSIFICATION_SERVICE_URL: "http://classification-service:3000"
      KAFKA_BROKERS: "192.168.100.201:9092,192.168.100.203:9092"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "80"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: "admin"
      MINIO_SECRET_KEY: "password123"
    depends_on:
      - minio
      - kafka1
      - kafka3
    networks:
      - sistema-network
    deploy:
      placement:
        constraints:
          - node.hostname == diego

  classification-service:
    image: infrastructure-classification-service:latest
    environment:
      HUGGINGFACE_API_TOKEN: ""
      ZERO_SHOT_MODEL: "MoritzLaurer/mDeBERTa-v3-base-mnli-xnli"
      CLASSIFICATION_THRESHOLD: "0.45"
      CLASSIFICATION_MAX_CHARS: "2500"
      USER_SERVICE_URL: "http://user-service:3000"
      CLASSIFICATION_MODEL_URL: "http://classification-model:5000"
      KAFKA_BROKERS: "192.168.100.201:9092,192.168.100.203:9092"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "80"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: "admin"
      MINIO_SECRET_KEY: "password123"
    depends_on:
      - minio
      - kafka1
      - kafka3
      - classification-model
    networks:
      - sistema-network
    deploy:
      placement:
        constraints:
          - node.hostname == diego

  citation-service:
    image: infrastructure-citation-service:latest
    networks:
      - sistema-network
    deploy:
      placement:
        constraints:
          - node.hostname == diego

  kafka1:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka1
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "kraft-cluster-1"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://192.168.100.201:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@192.168.100.201:9093,3@192.168.100.203:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "2"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "2"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    volumes:
      - /mnt/distributed/kafka1:/var/lib/kafka/data
    networks:
      - sistema-network
    deploy:
      placement:
        constraints:
          - node.hostname == dylan

  kafka3:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka3
    ports:
      - "9094:9092"
    environment:
      CLUSTER_ID: "kraft-cluster-1"
      KAFKA_NODE_ID: "3"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://192.168.100.203:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@192.168.100.201:9093,3@192.168.100.203:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "2"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "2"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    volumes:
      - /mnt/distributed/kafka3:/var/lib/kafka/data
    networks:
      - sistema-network
    deploy:
      placement:
        constraints:
          - node.hostname == diego

  classification-model:
    image: infrastructure-classification-model:latest
    environment:
      FLASK_ENV: "production"
    networks:
      - sistema-network
    deploy:
      placement:
        constraints:
          - node.hostname == diego

networks:
  sistema-network:
    external: true
    name: sistema-overlay